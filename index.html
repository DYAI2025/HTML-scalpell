<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Architecture Scalpell · generic architecture documentation tool</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #08090d;
    --bg2:      #0d0f16;
    --navy:     #111827;
    --gold:     #c9a84c;
    --gold2:    #e8c97a;
    --cream:    #f0e6c8;
    --dim:      #4a4550;
    --muted:    #8a7f9a;
    --red:      #c44b4b;
    --teal:     #3a7d78;
    --violet:   #5c3d7a;
    --forest:   #2d5a3d;
    --rust:     #8b3a2a;
    --edit:     #c9a84c;
    --add:      #5a9c6c;
    --del:      #c44b4b;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--cream);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
  }

  /* ── HEADER ── */
  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 24px;
    background: linear-gradient(180deg, rgba(8,9,13,0.97) 70%, transparent);
    border-bottom: 1px solid rgba(201,168,76,0.15);
  }
  #header-left h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300; font-size: 1.05rem; letter-spacing: 0.2em;
    color: var(--gold);
  }
  #header-left span {
    font-size: 0.6rem; color: var(--muted); letter-spacing: 0.15em;
  }

  #header-actions {
    display: flex; gap: 10px; align-items: center;
  }

  .header-btn {
    background: rgba(13,15,22,0.95);
    border: 1px solid rgba(201,168,76,0.25);
    color: var(--cream);
    padding: 7px 13px;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
  }
  .header-btn:hover {
    border-color: var(--gold);
    color: var(--gold2);
  }
  .header-btn.active {
    background: rgba(201,168,76,0.15);
    border-color: var(--gold);
    color: var(--gold2);
  }
  .header-btn.export {
    background: rgba(45,90,61,0.2);
    border-color: rgba(90,156,108,0.4);
    color: #9ad4ab;
  }
  .header-btn.export:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  .header-btn.export.alt {
    background: rgba(100,140,200,0.2);
    border-color: rgba(140,170,210,0.4);
    color: #a8c0e0;
  }
  .header-btn.export.alt:hover {
    background: rgba(100,140,200,0.35);
    border-color: rgba(160,190,230,0.7);
    color: #d8e4f4;
  }
  .badge {
    display: inline-block;
    background: var(--gold);
    color: var(--bg);
    padding: 1px 6px;
    border-radius: 8px;
    font-size: 0.55rem;
    margin-left: 6px;
    font-weight: 500;
  }

  .legend-strip {
    display: flex; gap: 14px; align-items: center;
    padding: 0 16px;
    border-left: 1px solid rgba(201,168,76,0.15);
    border-right: 1px solid rgba(201,168,76,0.15);
  }
  .legend-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 0.55rem; color: var(--muted); letter-spacing: 0.1em;
  }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; }

  /* ── EDIT MODE BANNER ── */
  #edit-banner {
    position: fixed; top: 53px; left: 0; right: 0; z-index: 99;
    background: rgba(201,168,76,0.1);
    border-bottom: 1px solid rgba(201,168,76,0.3);
    padding: 8px 24px;
    display: none;
    align-items: center; justify-content: space-between;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: var(--gold2);
  }
  #edit-banner.visible { display: flex; }

  /* ── CANVAS ── */
  #canvas-wrap {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    cursor: grab;
  }
  #canvas-wrap:active { cursor: grabbing; }
  #scene {
    position: relative;
    width: 2400px; height: 1600px;
    transform-origin: center center;
    transition: transform 0.08s linear;
  }

  #lines-svg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  /* ── NODES ── */
  .node {
    position: absolute;
    transform: translate(-50%, -50%);
    cursor: pointer;
    transition: filter 0.2s, transform 0.2s;
  }
  .node:hover { filter: brightness(1.25); transform: translate(-50%, -50%) scale(1.06); z-index: 10; }
  .node.active { filter: brightness(1.4); z-index: 20; }
  .node.modified .node-inner::after {
    content: '●'; position: absolute;
    top: -4px; right: -4px;
    color: var(--gold); font-size: 0.7rem;
  }
  .node.new-node .node-inner {
    border-color: var(--add) !important;
    border-style: dashed !important;
  }
  .node.deleted .node-inner {
    opacity: 0.4;
    text-decoration: line-through;
    border-style: dashed !important;
    border-color: var(--del) !important;
  }

  .node-inner {
    border: 1px solid rgba(201,168,76,0.35);
    background: rgba(13,15,22,0.92);
    border-radius: 4px;
    padding: 10px 14px;
    text-align: center;
    min-width: 130px;
    position: relative;
    backdrop-filter: blur(8px);
  }
  .node-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.85rem; letter-spacing: 0.06em;
    color: var(--cream); display: block;
  }
  .node-sub {
    font-size: 0.55rem; color: var(--muted);
    letter-spacing: 0.1em; display: block; margin-top: 2px;
  }
  .node-icon {
    font-size: 1.2rem; display: block; margin-bottom: 4px; line-height: 1;
  }

  /* Dynamic colors are applied inline */

  /* ── DETAIL PANEL ── */
  #detail-panel {
    position: fixed; right: 0; top: 0; bottom: 0;
    width: 380px;
    background: rgba(8,9,13,0.97);
    border-left: 1px solid rgba(201,168,76,0.2);
    padding: 90px 22px 24px;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.22,1,0.36,1);
    z-index: 50;
    overflow-y: auto;
  }
  #detail-panel.open { transform: translateX(0); }

  #panel-close {
    position: absolute; top: 90px; left: -1px;
    width: 28px; height: 28px;
    background: rgba(8,9,13,0.97);
    border: 1px solid rgba(201,168,76,0.2);
    border-right: none;
    color: var(--muted); font-size: 1rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: color 0.2s;
  }
  #panel-close:hover { color: var(--gold); }

  .panel-section { margin-bottom: 22px; }
  .panel-title-row {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 8px;
  }
  .panel-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem; font-weight: 400;
    color: var(--gold2); margin-bottom: 4px;
    flex: 1;
  }
  .panel-subtitle {
    font-size: 0.6rem; color: var(--muted);
    letter-spacing: 0.15em; text-transform: uppercase;
    margin-bottom: 14px;
  }
  .panel-divider {
    height: 1px; background: rgba(201,168,76,0.12); margin: 16px 0;
  }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }

  /* ── EDIT BUTTONS ── */
  .edit-icon-btn {
    background: transparent;
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold);
    width: 22px; height: 22px;
    cursor: pointer; border-radius: 2px;
    font-size: 0.55rem;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    font-family: 'DM Mono', monospace;
  }
  .edit-icon-btn:hover {
    background: rgba(201,168,76,0.15);
    color: var(--gold2);
  }
  .edit-icon-btn.del {
    border-color: rgba(196,75,75,0.4);
    color: #d77;
  }
  .edit-icon-btn.del:hover {
    background: rgba(196,75,75,0.15);
    color: #f99;
  }
  .edit-icon-btn.add {
    border-color: rgba(90,156,108,0.4);
    color: #9ad4ab;
  }
  .edit-icon-btn.add:hover {
    background: rgba(90,156,108,0.15);
    color: #b5e6c4;
  }

  .edit-row-actions {
    position: absolute; top: 6px; right: 6px;
    display: flex; gap: 4px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .api-route:hover .edit-row-actions,
  .flow-step:hover .edit-row-actions {
    opacity: 1;
  }

  .api-route, .flow-step {
    position: relative;
  }

  /* ── API ROUTES ── */
  .api-route {
    background: rgba(18,20,30,0.9);
    border: 1px solid rgba(100,100,140,0.3);
    border-radius: 3px;
    padding: 8px 10px;
    margin-bottom: 8px;
    font-size: 0.62rem;
  }
  .api-route.modified {
    border-color: rgba(201,168,76,0.5);
    box-shadow: 0 0 0 1px rgba(201,168,76,0.15);
  }
  .api-route.new {
    border-color: rgba(90,156,108,0.5);
    border-style: dashed;
  }
  .api-route.deleted {
    opacity: 0.4;
    text-decoration: line-through;
  }

  .api-method {
    display: inline-block;
    padding: 1px 5px; border-radius: 2px;
    font-size: 0.55rem;
    margin-right: 6px; letter-spacing: 0.05em;
  }
  .method-get  { background: rgba(58,125,120,0.3); color: #6fcac4; border: 1px solid rgba(58,125,120,0.4); }
  .method-post { background: rgba(92,61,122,0.3);  color: #b08cde; border: 1px solid rgba(92,61,122,0.4); }
  .method-put  { background: rgba(201,168,76,0.25); color: var(--gold2); border: 1px solid rgba(201,168,76,0.4); }
  .method-delete { background: rgba(196,75,75,0.25); color: #e88; border: 1px solid rgba(196,75,75,0.4); }

  .method-patch { background: rgba(100,100,180,0.28); color: #aeb2ff; border: 1px solid rgba(100,100,180,0.45); }
  .connection-row {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    background: rgba(18,20,30,0.55);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 3px;
    padding: 7px 8px;
    margin-bottom: 6px;
    font-size: 0.58rem;
    color: var(--muted);
  }
  .mini-input-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    margin-bottom: 8px;
  }

  .api-path { color: var(--cream); font-size: 0.62rem; }
  .api-desc { color: var(--muted); font-size: 0.58rem; margin-top: 4px; line-height: 1.4; }
  .api-params {
    margin-top: 6px; padding-top: 6px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .api-params code {
    display: block; font-size: 0.56rem;
    color: rgba(201,168,76,0.7); margin-bottom: 2px;
  }

  /* ── FLOW STEPS ── */
  .flow-step {
    display: flex; align-items: flex-start; gap: 8px;
    margin-bottom: 8px;
    padding: 4px 28px 4px 0;
    border-radius: 2px;
  }
  .flow-step.modified { background: rgba(201,168,76,0.06); }
  .flow-step.new { background: rgba(90,156,108,0.08); border: 1px dashed rgba(90,156,108,0.4); padding: 4px 28px 4px 4px; }
  .flow-step.deleted { opacity: 0.4; text-decoration: line-through; }
  .step-num {
    width: 18px; height: 18px; border-radius: 50%;
    background: rgba(201,168,76,0.15);
    border: 1px solid rgba(201,168,76,0.35);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.55rem; color: var(--gold); flex-shrink: 0;
  }
  .step-text { font-size: 0.6rem; color: var(--cream); line-height: 1.5; }

  /* ── TAGS ── */
  .tag {
    display: inline-block; padding: 2px 6px;
    border-radius: 2px; font-size: 0.55rem;
    margin: 2px; letter-spacing: 0.05em;
  }
  .tag-astro { background: rgba(92,61,122,0.25); color: #b08cde; border: 1px solid rgba(92,61,122,0.4); }
  .tag-bazi  { background: rgba(58,125,120,0.25); color: #6fcac4; border: 1px solid rgba(58,125,120,0.4); }
  .tag-sig   { background: rgba(139,58,42,0.25);  color: #e08060; border: 1px solid rgba(139,58,42,0.4); }
  .tag-quiz  { background: rgba(45,90,61,0.25);   color: #7abf8c; border: 1px solid rgba(45,90,61,0.4); }

  /* ── INLINE EDIT FORM ── */
  .edit-form {
    background: rgba(20,22,32,0.95);
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 3px;
    padding: 12px;
    margin: 8px 0;
  }
  .edit-form label {
    display: block;
    font-size: 0.55rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 4px;
    margin-top: 8px;
    text-transform: uppercase;
  }
  .edit-form label:first-child { margin-top: 0; }
  .edit-form input, .edit-form select, .edit-form textarea {
    width: 100%;
    background: rgba(8,9,13,0.95);
    border: 1px solid rgba(201,168,76,0.2);
    color: var(--cream);
    padding: 6px 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.2s;
  }
  .edit-form input:focus, .edit-form select:focus, .edit-form textarea:focus {
    border-color: var(--gold);
  }
  .edit-form textarea {
    min-height: 60px;
    resize: vertical;
    font-family: 'DM Mono', monospace;
  }
  .edit-form-actions {
    display: flex; gap: 8px; margin-top: 12px;
  }
  .edit-form-actions button {
    flex: 1;
    background: transparent;
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold);
    padding: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    cursor: pointer;
    border-radius: 2px;
    letter-spacing: 0.08em;
    transition: all 0.2s;
  }
  .edit-form-actions button:hover {
    background: rgba(201,168,76,0.15);
    color: var(--gold2);
  }
  .edit-form-actions button.cancel {
    border-color: rgba(255,255,255,0.15);
    color: var(--muted);
  }
  .edit-form-actions button.cancel:hover {
    background: rgba(255,255,255,0.05);
    color: var(--cream);
  }

  /* ── ADD BUTTONS ── */
  .add-row-btn {
    width: 100%;
    background: transparent;
    border: 1px dashed rgba(90,156,108,0.4);
    color: rgba(154,212,171,0.7);
    padding: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    cursor: pointer;
    border-radius: 2px;
    letter-spacing: 0.08em;
    transition: all 0.2s;
    margin-top: 4px;
  }
  .add-row-btn:hover {
    background: rgba(90,156,108,0.1);
    color: #b5e6c4;
    border-color: rgba(90,156,108,0.7);
  }
  .add-row-btn[hidden] { display: none !important; }

  /* ── CONTROLS ── */
  #controls {
    position: fixed; bottom: 18px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 100;
  }
  .ctrl-btn {
    width: 32px; height: 32px;
    background: rgba(13,15,22,0.95);
    border: 1px solid rgba(201,168,76,0.2);
    color: var(--muted); font-size: 0.9rem;
    cursor: pointer; border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.2s, border-color 0.2s;
  }
  .ctrl-btn:hover { color: var(--gold); border-color: rgba(201,168,76,0.5); }

  /* ── STARS ── */
  #stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

  /* ── PULSE ── */
  @keyframes pulse-ring {
    0%   { transform: translate(-50%,-50%) scale(1);    opacity: 0.6; }
    100% { transform: translate(-50%,-50%) scale(1.7);  opacity: 0; }
  }
  .pulse {
    position: absolute; border-radius: 50%;
    border: 1px solid var(--gold);
    pointer-events: none;
    animation: pulse-ring 2.4s infinite;
    width: 60px; height: 60px;
  }

  /* ── EXPORT MODAL ── */
  #modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: none;
    align-items: center; justify-content: center;
    padding: 30px;
  }
  #modal-overlay.visible { display: flex; }

  #modal {
    background: var(--bg);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 4px;
    width: 100%;
    max-width: 900px;
    height: 90vh;
    max-height: 800px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #modal-header {
    padding: 18px 24px;
    border-bottom: 1px solid rgba(201,168,76,0.15);
    display: flex; justify-content: space-between; align-items: center;
  }
  #modal-header h2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: 1.4rem;
    color: var(--gold2);
    letter-spacing: 0.05em;
  }
  #modal-header .sub {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    margin-top: 2px;
  }
  #modal-close {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--muted);
    width: 28px; height: 28px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }
  #modal-close:hover { color: var(--gold); border-color: var(--gold); }

  #modal-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
  }

  #modal-footer {
    padding: 14px 24px;
    border-top: 1px solid rgba(201,168,76,0.15);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .modal-btn {
    background: rgba(13,15,22,0.95);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--cream);
    padding: 9px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .modal-btn:hover {
    border-color: var(--gold);
    color: var(--gold2);
    background: rgba(201,168,76,0.1);
  }
  .modal-btn.primary {
    background: rgba(201,168,76,0.15);
    border-color: var(--gold);
    color: var(--gold2);
  }
  .modal-btn.primary:hover {
    background: rgba(201,168,76,0.25);
  }
  .modal-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Step indicator */
  .steps {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
  }
  .step-pill {
    flex: 1;
    padding: 8px;
    text-align: center;
    background: rgba(13,15,22,0.95);
    border: 1px solid rgba(255,255,255,0.05);
    font-size: 0.55rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    border-radius: 2px;
  }
  .step-pill.active {
    background: rgba(201,168,76,0.12);
    border-color: rgba(201,168,76,0.4);
    color: var(--gold2);
  }
  .step-pill.done {
    border-color: rgba(90,156,108,0.4);
    color: #9ad4ab;
  }

  /* Change list */
  .change-list {
    background: rgba(13,15,22,0.6);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 3px;
    padding: 0;
    overflow: hidden;
  }
  .change-item {
    padding: 12px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 0.65rem;
  }
  .change-item:last-child { border-bottom: none; }
  .change-meta {
    display: flex;
    gap: 8px;
    margin-bottom: 6px;
    align-items: center;
    flex-wrap: wrap;
  }
  .change-type {
    padding: 2px 6px;
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    border-radius: 2px;
  }
  .change-type.modify { background: rgba(201,168,76,0.2); color: var(--gold2); border: 1px solid rgba(201,168,76,0.4); }
  .change-type.add    { background: rgba(90,156,108,0.2); color: #9ad4ab; border: 1px solid rgba(90,156,108,0.4); }
  .change-type.delete { background: rgba(196,75,75,0.2); color: #e88; border: 1px solid rgba(196,75,75,0.4); }
  .change-target {
    font-size: 0.6rem;
    color: var(--cream);
  }
  .change-node {
    font-size: 0.55rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }
  .change-detail {
    font-size: 0.6rem;
    color: var(--muted);
    line-height: 1.5;
    padding-left: 8px;
    border-left: 2px solid rgba(201,168,76,0.2);
  }

  /* Markdown output */
  #brief-output {
    background: rgba(13,15,22,0.85);
    border: 1px solid rgba(201,168,76,0.2);
    padding: 18px 22px;
    font-size: 0.7rem;
    line-height: 1.6;
    color: var(--cream);
    border-radius: 3px;
    white-space: pre-wrap;
    font-family: 'DM Mono', monospace;
    max-height: 100%;
    overflow-y: auto;
  }
  #brief-output h1, #brief-output h2, #brief-output h3 {
    font-family: 'Cormorant Garamond', serif;
    color: var(--gold2);
    margin: 1em 0 0.4em;
    letter-spacing: 0.03em;
  }

  /* Loading */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 14px;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 1px solid rgba(201,168,76,0.15);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 1.2s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-align: center;
  }
  .loading-sub {
    font-size: 0.55rem;
    color: var(--dim);
    letter-spacing: 0.1em;
  }

  /* Validation */
  .validation-block {
    background: rgba(196,75,75,0.08);
    border: 1px solid rgba(196,75,75,0.3);
    padding: 12px 14px;
    border-radius: 3px;
    margin-bottom: 14px;
  }
  .validation-block.ok {
    background: rgba(90,156,108,0.08);
    border-color: rgba(90,156,108,0.3);
  }
  .validation-block h4 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.95rem;
    margin-bottom: 6px;
    color: #e88;
  }
  .validation-block.ok h4 { color: #9ad4ab; }
  .validation-block ul {
    list-style: none;
    padding-left: 12px;
  }
  .validation-block li {
    font-size: 0.6rem;
    color: var(--muted);
    line-height: 1.6;
    padding: 2px 0;
    position: relative;
  }
  .validation-block li::before {
    content: '→';
    position: absolute;
    left: -12px;
    color: rgba(201,168,76,0.5);
  }

  .empty-state {
    text-align: center;
    padding: 80px 30px;
    color: var(--muted);
  }
  .empty-state h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    color: var(--gold);
    margin-bottom: 10px;
    font-weight: 300;
  }
  .empty-state p {
    font-size: 0.7rem;
    line-height: 1.7;
    letter-spacing: 0.05em;
  }

  /* scrollbars */
  #detail-panel::-webkit-scrollbar,
  #modal-body::-webkit-scrollbar,
  #brief-output::-webkit-scrollbar { width: 4px; }
  #detail-panel::-webkit-scrollbar-track,
  #modal-body::-webkit-scrollbar-track,
  #brief-output::-webkit-scrollbar-track { background: transparent; }
  #detail-panel::-webkit-scrollbar-thumb,
  #modal-body::-webkit-scrollbar-thumb,
  #brief-output::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.2); border-radius: 2px; }

  .toast {
    position: fixed;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(8,9,13,0.97);
    border: 1px solid rgba(201,168,76,0.4);
    color: var(--gold2);
    padding: 10px 18px;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    border-radius: 2px;
    z-index: 300;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.visible { opacity: 1; }

  /* Lang select */
  #lang-select {
    background: rgba(13,15,22,0.95);
    border: 1px solid rgba(201,168,76,0.25);
    color: var(--cream);
    padding: 7px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    border-radius: 2px;
    outline: none;
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<!-- Header -->
<div id="header">
  <div id="header-left">
    <h1 id="header-title">Architecture Scalpell</h1>
    <span>GENERIC BACKEND DOCUMENTATION TOOL</span>
  </div>

  <div class="legend-strip" id="legend-strip">
    <!-- Populated dynamically -->
  </div>

  <div id="header-actions">
    <button class="header-btn" id="add-node-btn" onclick="startAddNode()" style="display:none">+ NEW NODE</button>
    <button class="header-btn" id="settings-btn" onclick="openSettingsModal()" title="Projekt-Metadaten bearbeiten">⚙ SETTINGS</button>
    <button class="header-btn" id="save-local-btn" onclick="saveLocalState()" title="Speichert den aktuellen Stand im Browser">SAVE</button>
    <button class="header-btn" id="load-local-btn" onclick="loadLocalState()" title="Laedt den gespeicherten Browser-Stand">LOAD</button>
    <button class="header-btn" id="import-json-btn" onclick="openImportJson()" title="Importiert eine zuvor exportierte JSON-Datei">IMPORT</button>
    <button class="header-btn" id="export-json-btn" onclick="downloadArchitectureJSON()" title="Exportiert Nodes, Edges und Change-Log als JSON">EXPORT DATA</button>
    <button class="header-btn export alt" id="export-arch-btn" onclick="exportFullArchitecture()" title="Generiert komplette arc42-Dokumentation">⊞ EXPORT-ALL-STATES</button>
    <button class="header-btn export" id="export-html-btn" onclick="downloadEditedHTML()" title="Exportiert diese HTML-Datei mit aktuellem Stand">EXPORT HTML</button>
    <button class="header-btn export alt" id="auto-improve-btn" onclick="openAutoImproveModal()" title="Evaluates one strategic architecture improvement">AUTO-IMPROVE</button>
    <button class="header-btn" id="edit-toggle" onclick="toggleEditMode()">EDIT MODE</button>
    <button class="header-btn export" id="export-btn" onclick="openExportModal()" disabled>
      EXPORT BRIEF<span class="badge" id="change-count" style="display:none">0</span>
    </button>
    <input id="import-json-file" type="file" accept="application/json,.json" hidden onchange="importArchitectureJSON(event)">
  </div>
</div>

<!-- Edit mode banner -->
<div id="edit-banner">
  <div>◈ EDIT MODE — Eintraege, Nodes, Positionen und Verbindungen gezielt bearbeiten. SAVE/EXPORT HTML schreibt den aktuellen Stand.</div>
  <div>
    <button class="header-btn" onclick="discardChanges()" style="font-size:0.55rem; padding: 4px 10px;">DISCARD ALL</button>
  </div>
</div>

<!-- Scene -->
<div id="canvas-wrap">
  <div id="scene">
    <svg id="lines-svg" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>

<!-- Detail Panel -->
<div id="detail-panel">
  <button id="panel-close" onclick="closePanel()">←</button>
  <div id="panel-content"></div>
</div>

<!-- Controls -->
<div id="controls">
  <button class="ctrl-btn" onclick="zoom(1.15)" title="Zoom in">+</button>
  <button class="ctrl-btn" onclick="zoom(0.87)" title="Zoom out">−</button>
  <button class="ctrl-btn" onclick="resetView()" title="Reset">⊙</button>
</div>

<!-- Modal -->
<div id="modal-overlay">
  <div id="modal">
    <div id="modal-header">
      <div>
        <h2>Development Brief Generator</h2>
        <div class="sub">CHANGES → VALIDATED MARKDOWN → CODING AGENT</div>
      </div>
      <button id="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="modal-body"></div>
    <div id="modal-footer"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ╔══════════════════════════════════════════════════════════════════╗
// ║  STARS BACKGROUND                                                 ║
// ╚══════════════════════════════════════════════════════════════════╝
(function(){
  const c = document.getElementById('stars');
  const ctx = c.getContext('2d');
  c.width = window.innerWidth; c.height = window.innerHeight;
  for(let i=0;i<180;i++){
    const x=Math.random()*c.width, y=Math.random()*c.height;
    const r=Math.random()*1.2;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=`rgba(240,230,200,${Math.random()*0.5+0.1})`;
    ctx.fill();
  }
})();

// ╔══════════════════════════════════════════════════════════════════╗
// ║  DATA                                                             ║
// ╚══════════════════════════════════════════════════════════════════╝
let PROJECT = {
  name: "Architecture Visualization",
  repo: "github.com/DYAI2025/HTML-scalpell",
  domain: "my-service.internal",
  description: "Generic backend architecture visualization and documentation tool.",
  stack: ["Vanilla JS", "HTML", "CSS"],
  qualityGoals: [
    { priority: 1, quality: "Extensibility", scenario: "Can model any architecture easily." },
    { priority: 2, quality: "Portability", scenario: "Single-file HTML with no build step." }
  ],
  constraints: {
    technical: ["No database (local storage)", "No backend"],
    design: ["Dark theme", "Monospace aesthetic"]
  },
  solutionStrategy: [
    "Interactive SVG graph with side-panel editing."
  ],
  glossary: [
    { term: "Node", definition: "A service, database, or component." },
    { term: "Edge", definition: "A connection or data flow between nodes." }
  ]
};

const initialNodes = [];
const initialEdges = [];

const TYPE_COLORS = {};
const PALETTE = [
  { border: 'rgba(201,168,76,0.7)',  bg: 'rgba(40,30,10,0.92)' },
  { border: 'rgba(92,61,122,0.8)',   bg: 'rgba(20,10,35,0.92)' },
  { border: 'rgba(58,125,120,0.8)',  bg: 'rgba(8,28,26,0.92)'  },
  { border: 'rgba(45,90,61,0.8)',    bg: 'rgba(8,22,12,0.92)'  },
  { border: 'rgba(139,58,42,0.8)',   bg: 'rgba(30,10,8,0.92)'  },
  { border: 'rgba(100,100,120,0.5)', bg: 'rgba(18,18,28,0.88)' },
  { border: 'rgba(70,130,180,0.7)',  bg: 'rgba(10,20,35,0.92)' },
  { border: 'rgba(180,80,80,0.7)',   bg: 'rgba(35,10,10,0.92)' },
];

function getTypeColor(type) {
  if (!TYPE_COLORS[type]) {
    const idx = Object.keys(TYPE_COLORS).length % PALETTE.length;
    TYPE_COLORS[type] = PALETTE[idx];
  }
  return TYPE_COLORS[type];
}

function updateLegend() {
  const strip = document.getElementById('legend-strip');
  strip.innerHTML = '';
  Object.keys(TYPE_COLORS).forEach(type => {
    const c = TYPE_COLORS[type];
    const match = c.border.match(/rgba?\(([^,]+),([^,]+),([^,]+)/);
    const dotColor = match ? `rgb(${match[1]},${match[2]},${match[3]})` : '#ccc';
    strip.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${dotColor}"></div> ${escape(type).toUpperCase()}</div>`;
  });
}

// ╔══════════════════════════════════════════════════════════════════╗
// ║  STATE                                                            ║
// ╚══════════════════════════════════════════════════════════════════╝
let nodes = JSON.parse(JSON.stringify(initialNodes));
let edges = JSON.parse(JSON.stringify(initialEdges));
let nodeMap = {};
nodes.forEach(n => nodeMap[n.id] = n);

let editMode = false;
let activeNodeId = null;
let changes = []; // {id, type:'modify|add|delete', target:'node|api|flow|notes|tags|title', nodeId, before, after, description}

function uid() { return 'c_' + Math.random().toString(36).slice(2, 9); }

function recordChange(c) {
  changes.push({ id: uid(), timestamp: Date.now(), ...c });
  updateChangeUI();
}

function updateChangeUI() {
  const count = changes.length;
  const badge = document.getElementById('change-count');
  const btn = document.getElementById('export-btn');
  if (count > 0) {
    badge.style.display = 'inline-block';
    badge.textContent = count;
    btn.disabled = false;
  } else {
    badge.style.display = 'none';
    btn.disabled = true;
  }
  // refresh node visuals
  nodes.forEach(n => {
    const el = document.getElementById('node-' + n.id);
    if (!el) return;
    const hasChange = changes.some(c => c.nodeId === n.id);
    el.classList.toggle('modified', hasChange && !changes.some(c=>c.nodeId===n.id&&c.type==='delete'));
    el.classList.toggle('deleted', changes.some(c=>c.nodeId===n.id&&c.type==='delete'&&c.target==='node'));
    el.classList.toggle('new-node', changes.some(c=>c.nodeId===n.id&&c.type==='add'&&c.target==='node'));
  });
}

// ╔══════════════════════════════════════════════════════════════════╗
// ║  RENDER                                                           ║
// ╚══════════════════════════════════════════════════════════════════╝
const scene = document.getElementById('scene');
const svg = document.getElementById('lines-svg');

function renderAll() {
  // Clear
  scene.querySelectorAll('.node').forEach(el => el.remove());
  svg.innerHTML = '';

  // Nodes
  nodes.forEach(n => renderNode(n));

  // Edges
  renderEdges();

  updateLegend();

  updateChangeUI();
}

function renderNode(n) {
  const el = document.createElement('div');
  el.className = `node node-${n.type}`;
  el.id = 'node-' + n.id;
  el.style.left = n.x + 'px';
  el.style.top  = n.y + 'px';
  const color = getTypeColor(n.type);
  el.innerHTML = `
    <div class="node-inner" style="border-color:${color.border}; background:${color.bg};">
      <span class="node-icon">${n.icon}</span>
      <span class="node-label">${escape(n.label)}</span>
      <span class="node-sub">${escape(n.sub)}</span>
    </div>
  `;
  el.addEventListener('click', () => openPanel(n.id));
  scene.appendChild(el);
}

function renderEdges() {
  let defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  svg.appendChild(defs);

  const styleMap = {
    primary:   { stroke:'rgba(201,168,76,0.55)',  width:'1.5', dash:'none' },
    secondary: { stroke:'rgba(201,168,76,0.25)',  width:'1',   dash:'none' },
    tertiary:  { stroke:'rgba(180,160,220,0.2)',  width:'0.8', dash:'none' },
    api:       { stroke:'rgba(100,140,200,0.3)',  width:'0.8', dash:'4,4'  },
  };

  edges.forEach((e, i) => {
    const f = nodeMap[e.from], t = nodeMap[e.to];
    if (!f || !t) return;
    const s = styleMap[e.style] || styleMap.secondary;

    const dx = t.x - f.x, dy = t.y - f.y;
    const cx1 = f.x + dx * 0.4, cy1 = f.y;
    const cx2 = t.x - dx * 0.4, cy2 = t.y;
    const d = `M ${f.x} ${f.y} C ${cx1} ${cy1}, ${cx2} ${cy2}, ${t.x} ${t.y}`;

    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', d);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', s.stroke);
    path.setAttribute('stroke-width', s.width);
    if (e.dashed || s.dash !== 'none') path.setAttribute('stroke-dasharray', s.dash === 'none' ? '4,4' : s.dash);

    const markerId = `arr-${i}`;
    const marker = document.createElementNS('http://www.w3.org/2000/svg','marker');
    marker.setAttribute('id', markerId);
    marker.setAttribute('markerWidth','5'); marker.setAttribute('markerHeight','5');
    marker.setAttribute('refX','4'); marker.setAttribute('refY','2.5');
    marker.setAttribute('orient','auto');
    const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    poly.setAttribute('points','0 0, 5 2.5, 0 5');
    poly.setAttribute('fill', s.stroke);
    marker.appendChild(poly);
    defs.appendChild(marker);
    path.setAttribute('marker-end', `url(#${markerId})`);

    svg.appendChild(path);

    if (e.label) {
      const text = document.createElementNS('http://www.w3.org/2000/svg','text');
      const tx = 0.125*f.x + 0.375*cx1 + 0.375*cx2 + 0.125*t.x;
      const ty = 0.125*f.y + 0.375*cy1 + 0.375*cy2 + 0.125*t.y;
      text.setAttribute('x', tx);
      text.setAttribute('y', ty - 4);
      text.setAttribute('fill', 'rgba(201,168,76,0.7)');
      text.setAttribute('font-size', '6');
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('font-family', 'DM Mono, monospace');
      text.textContent = e.label;
      svg.appendChild(text);
    }
  });
}

function escape(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escTable(s) {
  return (s || '').replace(/\|/g, '\\|').replace(/\n/g, '<br>');
}

function escMermaid(s) {
  return `"${(s || '').replace(/"/g, "'")}"`;
}

// ╔══════════════════════════════════════════════════════════════════╗
// ║  PANEL                                                            ║
// ╚══════════════════════════════════════════════════════════════════╝
function openPanel(nodeId) {
  activeNodeId = nodeId;
  const n = nodeMap[nodeId];
  if (!n) return;
  const d = n.detail;

  document.querySelectorAll('.node').forEach(el => el.classList.remove('active'));
  document.getElementById('node-' + nodeId)?.classList.add('active');

  const editBtn = (handler, title='edit') => editMode ? `<button class="edit-icon-btn" onclick="${handler}" title="${title}">✎</button>` : '';
  const delBtn  = (handler, title='delete') => editMode ? `<button class="edit-icon-btn del" onclick="${handler}" title="${title}">×</button>` : '';

  const tagsHtml = (d.tags||[]).map(t => `<span class="tag tag-${t}">${escape(t.toUpperCase())}</span>`).join('');

  const flowHtml = (d.flow||[]).map((s,i) => `
    <div class="flow-step">
      <div class="step-num">${i+1}</div>
      <div class="step-text">${escape(s)}</div>
      <div class="edit-row-actions">
        ${editBtn(`editFlow('${nodeId}',${i})`,'edit step')}
        ${delBtn(`deleteFlow('${nodeId}',${i})`,'delete step')}
      </div>
    </div>`).join('');

  const apisHtml = (d.apis||[]).map((a,i) => `
    <div class="api-route">
      <span class="api-method method-${a.method.toLowerCase()}">${escape(a.method)}</span>
      <span class="api-path">${escape(a.path)}</span>
      <div class="api-desc">${escape(a.desc||'')}</div>
      ${a.params && a.params.length ? `<div class="api-params">${a.params.map(p=>`<code>→ ${escape(p)}</code>`).join('')}</div>` : ''}
      ${a.requestSchema ? `<div style="font-size:0.5rem;color:var(--muted);margin-top:4px;">REQ SCHEMA: ✓</div>` : ''}
      ${a.responseSchema ? `<div style="font-size:0.5rem;color:var(--muted);margin-top:2px;">RES SCHEMA: ✓</div>` : ''}
      <div class="edit-row-actions">
        ${editBtn(`editApi('${nodeId}',${i})`,'edit route')}
        ${delBtn(`deleteApi('${nodeId}',${i})`,'delete route')}
      </div>
    </div>`).join('');

  document.getElementById('panel-content').innerHTML = `
    <div class="panel-section">
      <div class="panel-title-row">
        <div>
          <div class="panel-title">${escape(d.title)}</div>
          <div class="panel-subtitle">${escape(d.subtitle)}</div>
        </div>
        ${editMode ? `
          <div style="display:flex; gap:4px; flex-shrink:0;">
            ${editBtn(`editTitle('${nodeId}')`,'edit title/subtitle')}
            ${delBtn(`deleteNode('${nodeId}')`,'delete entire node')}
          </div>` : ''}
      </div>
      <div>${tagsHtml}</div>
      ${editMode ? `<button class="add-row-btn" onclick="editTags('${nodeId}')">＋ EDIT TAGS</button>` : ''}
    </div>

    ${(d.flow && d.flow.length) || editMode ? `
    <div class="panel-divider"></div>
    <div class="panel-section">
      <div class="section-header">
        <div class="panel-subtitle">USER FLOW</div>
      </div>
      ${flowHtml}
      ${editMode ? `<button class="add-row-btn" onclick="addFlow('${nodeId}')">＋ ADD STEP</button>` : ''}
    </div>` : ''}

    ${(d.apis && d.apis.length) || editMode ? `
    <div class="panel-divider"></div>
    <div class="panel-section">
      <div class="section-header">
        <div class="panel-subtitle">API ROUTES</div>
      </div>
      ${apisHtml}
      ${editMode ? `<button class="add-row-btn" onclick="addApi('${nodeId}')">＋ ADD API ROUTE</button>` : ''}
    </div>` : ''}

    ${d.notes || editMode ? `
    <div class="panel-divider"></div>
    <div class="panel-section">
      <div class="section-header">
        <div class="panel-subtitle">NOTES</div>
        ${editBtn(`editNotes('${nodeId}')`,'edit notes')}
      </div>
      <div style="font-size:0.62rem;color:var(--muted);line-height:1.6">${escape(d.notes || '—')}</div>
    </div>` : ''}
  `;

  if (editMode) {
    appendNodeEditUtilities(nodeId);
  }

  document.getElementById('detail-panel').classList.add('open');
}

function closePanel() {
  document.getElementById('detail-panel').classList.remove('open');
  document.querySelectorAll('.node').forEach(el => el.classList.remove('active'));
  activeNodeId = null;
}

// ╔══════════════════════════════════════════════════════════════════╗
// ║  EDIT FUNCTIONS                                                   ║
// ╚══════════════════════════════════════════════════════════════════╝
function showInlineForm(targetEl, fields, onSave) {
  const formHtml = `
    <div class="edit-form">
      ${fields.map(f => {
        if (f.type === 'select') {
          return `<label>${f.label}</label>
            <select id="ef-${f.key}">
              ${f.options.map(o => `<option value="${escape(o.value)}" ${o.value===f.value?'selected':''}>${escape(o.label)}</option>`).join('')}
            </select>`;
        }
        if (f.type === 'textarea') {
          return `<label>${f.label}</label><textarea id="ef-${f.key}">${escape(f.value || '')}</textarea>`;
        }
        return `<label>${f.label}</label><input id="ef-${f.key}" value="${escape(f.value || '')}" placeholder="${escape(f.placeholder || '')}">`;
      }).join('')}
      <div class="edit-form-actions">
        <button onclick="(${onSave.toString()})()">SAVE</button>
        <button class="cancel" onclick="openPanel('${activeNodeId}')">CANCEL</button>
      </div>
    </div>`;
  targetEl.outerHTML = formHtml;
}

function editTitle(nodeId) {
  const n = nodeMap[nodeId];
  const before = { title: n.detail.title, subtitle: n.detail.subtitle, label: n.label, sub: n.sub };

  const html = `

  const outgoing = edges
    .map((e, i) => ({ ...e, idx: i }))
    .filter(e => e.from === nodeId);
  const incoming = edges
    .map((e, i) => ({ ...e, idx: i }))
    .filter(e => e.to === nodeId);

  const nodeOptions = nodes
    .filter(x => x.id !== nodeId && !x._deleted)

          <label>Y</label>

window.addEdgeFromPanel = function(nodeId) {
  const to = document.getElementById('ef-edge-to')?.value;
  const style = document.getElementById('ef-edge-style')?.value || 'secondary';
  const dashed = document.getElementById('ef-edge-dashed')?.value === 'true';
  const label = document.getElementById('ef-edge-label')?.value.trim();
  if (!to) { toast('Target node required'); return; }
  if (edges.some(e => e.from === nodeId && e.to === to)) { toast('Connection already exists'); return; }
  const edge = { from: nodeId, to, style };
  if (dashed) edge.dashed = true;
  if (label) edge.label = label;
  edges.push(edge);
  recordChange({ type:'add', target:'edge', nodeId, after: edge, description:`Added connection ${nodeId} → ${to} ${label ? `("${label}")` : ''} (${style}${dashed ? ', dashed' : ''})` });
  renderAll();
  openPanel(nodeId);
  toast('Connection added');
};

window.deleteEdge = function(idx, focusNodeId) {
  const edge = edges[idx];
  if (!edge) return;
  if (!confirm(`Delete connection ${edge.from} → ${edge.to}?`)) return;
  edges.splice(idx, 1);
  recordChange({ type:'delete', target:'edge', nodeId: focusNodeId || edge.from, before: edge, description:`Removed connection ${edge.from} → ${edge.to}` });
  renderAll();
  if (focusNodeId) openPanel(focusNodeId);

// ║  SAVE / IMPORT / EXPORT CURRENT ARCHITECTURE                      ║
// ╚══════════════════════════════════════════════════════════════════╝
const STORAGE_KEY = 'architecture-scalpell-state-v1';

function serializeArchitectureState(options = {}) {
  return {
    project: PROJECT,
    nodes: nodes,
    edges: edges,
    changes: changes,
    exportedAt: new Date().toISOString()
  };
}

function hydrateArchitectureState(state) {
  if (state.project) PROJECT = state.project;
  nodes = state.nodes || [];
  edges = state.edges || [];
  changes = state.changes || [];
  
  nodeMap = {};
  nodes.forEach(n => {
    if (!n.id) return;
    if (!n.detail) n.detail = { title:n.label || n.id, subtitle:n.sub || '', tags:[], flow:[], apis:[], notes:'' };
    nodeMap[n.id] = n;
  });
  
  renderAll();
  centerScene();
  updateChangeUI();
  
  if (document.getElementById('header-title')) {
    document.getElementById('header-title').textContent = PROJECT.name || 'Architecture Scalpell';
  }
}

  edges = edges.filter(e => e && nodeMap[e.from] && nodeMap[e.to]);
  closePanel();
  renderAll();
  updateChangeUI();
}

window.saveLocalState = function() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(serializeArchitectureState()));
    toast('State saved in browser');
  } catch (err) {
    console.error(err);
    toast('Save failed');
  }
};

window.loadLocalState = function() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) { toast('No saved browser state'); return; }
    hydrateArchitectureState(JSON.parse(raw), { keepChanges: true });
    toast('Browser state loaded');
  } catch (err) {
    console.error(err);
    toast('Load failed');
  }
};

window.openImportJson = function() {
  document.getElementById('import-json-file')?.click();
};

window.importArchitectureJSON = function(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const state = JSON.parse(String(reader.result));
      hydrateArchitectureState(state, { keepChanges: true });
      toast('JSON imported');
    } catch (err) {
      console.error(err);
      toast('Invalid JSON import');
    } finally {
      event.target.value = '';
    }
  };
  reader.readAsText(file);
};

function downloadBlob(filename, content, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 250);
}

window.downloadArchitectureJSON = function() {
  const stamp = new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
  const state = serializeArchitectureState();
  downloadBlob(`architecture-state-${stamp}.json`, JSON.stringify(state, null, 2), 'application/json');
  toast('Architecture JSON exported');
};

window.downloadEditedHTML = function() {
  try {
    let html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;

    // Bake the current edited state into the exported file.
    const bakedNodes = JSON.stringify(nodes, null, 2);
    const bakedEdges = JSON.stringify(edges, null, 2);
    const bakedProject = JSON.stringify(PROJECT, null, 2);
    
    html = html.replace(/let PROJECT = \{[\s\S]*?\};/, `let PROJECT = ${bakedProject};`);
    html = html.replace(/const initialNodes = \[[\s\S]*?\];\n\nconst initialEdges = \[[\s\S]*?\];/,
      `const initialNodes = ${bakedNodes};\n\nconst initialEdges = ${bakedEdges};`);

    // Exported HTML should open as a clean baseline, not as a pending change session.
    html = html.replace(/let changes = \[\]; \/\/ \{id, type:'modify\|add\|delete', target:'node\|api\|flow\|notes\|tags\|title', nodeId, before, after, description\}/,
      `let changes = []; // pending edits after this exported baseline`);
    html = html.replace(/renderAll\(\);\ncenterScene\(\);/,
      `renderAll();\ncenterScene();\n// Exported baseline generated at ${new Date().toISOString()}`);

    const stamp = new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
    downloadBlob(`architecture-tool-edited-${stamp}.html`, html, 'text/html');
    toast('Edited HTML exported');
  } catch (err) {
    console.error(err);
    toast('HTML export failed');
  }
};

function generateFullArchitectureMd() {
  const ts = new Date().toISOString();
  const totalEndpoints = nodes.reduce((s,n) => s + (n.detail.apis?.length || 0), 0);

  let md = '';
  md += `# Architecture Documentation — ${escTable(PROJECT.name)}\n\n`;
  md += `> **Snapshot:** ${ts}  \n`;
  md += `> **Repository:** \`${PROJECT.repo}\`  \n`;
  md += `> **Domain:** \`${PROJECT.domain}\`  \n`;
  md += `> **Format:** arc42 (lite) + OpenAPI-style endpoint reference  \n`;
  md += `> **Modules:** ${nodes.length} · **Endpoints:** ${totalEndpoints} · **Edges:** ${edges.length}\n\n`;

  md += `## Table of Contents\n\n`;
  md += `1. [Introduction & Goals](#1-introduction--goals)\n`;
  md += `2. [Constraints](#2-constraints)\n`;
  md += `3. [Context & Scope](#3-context--scope)\n`;
  md += `4. [Solution Strategy](#4-solution-strategy)\n`;
  md += `5. [Building Block View](#5-building-block-view)\n`;
  md += `6. [Runtime View — User Flows](#6-runtime-view--user-flows)\n`;
  md += `7. [API Reference](#7-api-reference)\n`;
  md += `8. [Module Catalogue](#8-module-catalogue)\n`;
  md += `9. [Glossary](#9-glossary)\n\n`;

  md += `## 1. Introduction & Goals\n\n`;
  md += `${escTable(PROJECT.description)}\n\n`;
  md += `### Quality Goals\n\n`;
  md += `| Priority | Quality | Concrete Scenario |\n`;
  md += `|----------|---------|-------------------|\n`;
  if (PROJECT.qualityGoals) {
    PROJECT.qualityGoals.forEach(g => {
      md += `| ${g.priority} | ${escTable(g.quality)} | ${escTable(g.scenario)} |\n`;
    });
  }
  md += `\n`;

  md += `## 2. Constraints\n\n`;
  md += `### Technical Constraints\n\n`;
  if (PROJECT.constraints && PROJECT.constraints.technical) {
    PROJECT.constraints.technical.forEach(s => md += `- ${escTable(s)}\n`);
  }
  md += `\n### Design Constraints\n\n`;
  if (PROJECT.constraints && PROJECT.constraints.design) {
    PROJECT.constraints.design.forEach(s => md += `- ${escTable(s)}\n`);
  }
  md += `\n`;

  md += `## 3. Context & Scope\n\n`;
  md += '\`\`\`mermaid\n';
  md += `graph LR\n`;
  md += `  user((User))\n`;
  md += `  app[Frontend]\n`;
  md += `  api[API Layer]\n`;
  md += `  user --> app\n  app --> api\n`;
  nodes.forEach(n => {
    md += `  api --> ${n.id}[${escMermaid(n.label)}]\n`;
  });
  md += '\`\`\`\n\n';

  md += `## 4. Solution Strategy\n\n`;
  if (PROJECT.solutionStrategy) {
    PROJECT.solutionStrategy.forEach(s => md += `- ${escTable(s)}\n`);
  }
  md += `\n`;

  md += `## 5. Building Block View\n\n`;
  md += '\`\`\`mermaid\n';
  md += `flowchart TD\n`;
  const groups = {};
  nodes.forEach(n => {
    if (!groups[n.type]) groups[n.type] = [];
    groups[n.type].push(n);
  });
  Object.entries(groups).forEach(([gname, gnodes]) => {
    md += `  subgraph ${gname.replace(/\\s/g,'_')}["${gname}"]\n`;
    gnodes.forEach(n => md += `    ${n.id}[${escMermaid(n.label)}]\n`);
    md += `  end\n`;
  });
  edges.forEach(e => {
    md += `  ${e.from} --${e.label ? escMermaid(e.label) : ''}--> ${e.to}\n`;
  });
  md += '\`\`\`\n\n';

  md += `## 6. Runtime View — User Flows\n\n`;
  nodes.forEach(n => {
    if(!n.detail.flow || n.detail.flow.length === 0) return;
    md += `### ${escTable(n.label)}\n\n`;
    md += `*${escTable(n.detail.subtitle)}*\n\n`;
    n.detail.flow.forEach((step, i) => md += `${i+1}. ${escTable(step)}\n`);
    md += `\n`;
  });

  md += `## 7. API Reference\n\n`;
  md += `Total endpoints: **${totalEndpoints}**\n\n`;
  md += `### Endpoint Index\n\n`;
  md += `| Method | Path | Module | Description |\n`;
  md += `|--------|------|--------|-------------|\n`;
  nodes.forEach(n => {
    (n.detail.apis||[]).forEach(a => {
      md += `| \`${a.method}\` | \`${escTable(a.path)}\` | ${escTable(n.label)} | ${escTable(a.desc)} |\n`;
    });
  });
  md += `\n`;

  md += `### Endpoint Details\n\n`;
  nodes.forEach(n => {
    if(!n.detail.apis || n.detail.apis.length === 0) return;
    md += `#### Module: ${escTable(n.label)}\n\n`;
    n.detail.apis.forEach(a => {
      md += `##### \`${a.method} ${escTable(a.path)}\`\n\n`;
      md += `${escTable(a.desc)}\n\n`;
      md += `**Parameters:**\n\n`;
      if(a.params && a.params.length) {
        md += `| Name | Description |\n|------|-------------|\n`;
        a.params.forEach(p => {
          const m = p.match(/^([^:]+):\\s*(.+)$/);
          if(m) md += `| \`${escTable(m[1].trim())}\` | ${escTable(m[2].trim())} |\n`;
          else  md += `| \`${escTable(p)}\` | — |\n`;
        });
      } else {
        md += `_None._\n`;
      }
      md += `\n`;
      if(a.requestSchema) {
        md += `**Request schema:**\n\n\`\`\`json\n${a.requestSchema}\n\`\`\`\n\n`;
      }
      if(a.responseSchema) {
        md += `**Response schema:**\n\n\`\`\`json\n${a.responseSchema}\n\`\`\`\n\n`;
      }
    });
  });

  md += `## 8. Module Catalogue\n\n`;
  nodes.forEach(n => {
    md += `### ${escTable(n.label)}\n\n`;
    md += `| Field | Value |\n|-------|-------|\n`;
    md += `| **ID** | \`${n.id}\` |\n`;
    md += `| **Type** | \`${n.type}\` |\n`;
    md += `| **Title** | ${escTable(n.detail.title)} |\n`;
    md += `| **Subtitle** | ${escTable(n.detail.subtitle)} |\n`;
    md += `| **Tags** | ${(n.detail.tags||[]).map(t=>'\`'+escTable(t)+'\`').join(', ') || '—'} |\n`;
    md += `| **Endpoints** | ${(n.detail.apis||[]).length} |\n`;
    md += `| **Inbound edges** | ${edges.filter(e=>e.to===n.id).map(e=>'\`'+e.from+'\`').join(', ') || '—'} |\n`;
    md += `| **Outbound edges** | ${edges.filter(e=>e.from===n.id).map(e=>'\`'+e.to+'\`').join(', ') || '—'} |\n\n`;
    if(n.detail.notes) md += `**Notes:** ${escTable(n.detail.notes)}\n\n`;
  });

  md += `## 9. Glossary\n\n`;
  md += `| Term | Definition |\n|------|------------|\n`;
  if (PROJECT.glossary) {
    PROJECT.glossary.forEach(g => {
      md += `| **${escTable(g.term)}** | ${escTable(g.definition)} |\n`;
    });
  }
  md += `\n---\n\n`;
  md += `*Snapshot generated from the interactive architecture sheet. Re-export after structural changes to keep documentation aligned with implementation.*\n`;

  return md;
}

function renderModal() {
  const body = document.getElementById('modal-body');
  const footer = document.getElementById('modal-footer');

  // step pills
  const stepsHtml = `
    <div class="steps">
      <div class="step-pill ${modalStep==='review'?'active':modalStep==='generating'||modalStep==='brief'?'done':''}">1 · REVIEW CHANGES</div>
      <div class="step-pill ${modalStep==='generating'?'active':modalStep==='brief'?'done':''}">2 · GENERATE + VALIDATE</div>
      <div class="step-pill ${modalStep==='brief'?'active':''}">3 · EXPORT MARKDOWN</div>
    </div>`;

  if (modalStep === 'review') {
    body.innerHTML = stepsHtml + renderChangeList();
    footer.innerHTML = `
      <select id="lang-select">
        <option value="en">Brief in English</option>
        <option value="de">Brief auf Deutsch</option>
      </select>
      <button class="modal-btn" onclick="closeModal()">CANCEL</button>
      <button class="modal-btn primary" onclick="startBriefGeneration()">GENERATE BRIEF →</button>
    `;
  } else if (modalStep === 'generating') {
    body.innerHTML = stepsHtml + `
      <div class="loading-state">
        <div class="spinner"></div>
        <div class="loading-text">CRAFTING DEVELOPMENT BRIEF</div>
        <div class="loading-sub" id="loading-sub">analyzing changes for completeness and consistency…</div>
      </div>`;
    footer.innerHTML = '';
  } else if (modalStep === 'brief') {
    body.innerHTML = stepsHtml +
      (validationResult ? renderValidation(validationResult) : '') +
      `<div id="brief-output">${escape(generatedBrief)}</div>`;
    footer.innerHTML = `
      <button class="modal-btn" onclick="modalStep='review';renderModal()">← BACK</button>
      <button class="modal-btn" onclick="startBriefGeneration()">REGENERATE</button>
      <button class="modal-btn" onclick="copyBrief()">COPY MARKDOWN</button>
      <button class="modal-btn primary" onclick="downloadBrief()">DOWNLOAD .md</button>
    `;
  }
}

function renderChangeList() {
  if (!changes.length) {
    return '<div class="empty-state"><h3>No changes yet</h3><p>Activate EDIT MODE and modify nodes, API routes, or flow steps.</p></div>';
  }

  const grouped = {};
  changes.forEach(c => {
    if (!grouped[c.nodeId]) grouped[c.nodeId] = [];
    grouped[c.nodeId].push(c);
  });

  const itemsHtml = Object.entries(grouped).map(([nodeId, list]) => {
    const node = nodeMap[nodeId] || list.find(c => c.before)?.before || { label: nodeId };
    return list.map(c => `
      <div class="change-item">
        <div class="change-meta">
          <span class="change-type ${c.type}">${c.type.toUpperCase()}</span>
          <span class="change-target">${c.target.toUpperCase()}</span>
          <span class="change-node">→ ${escape(nodeId)}${node.label ? ' · ' + escape(node.label) : ''}</span>
        </div>
        <div class="change-detail">${escape(c.description || '')}</div>
      </div>
    `).join('');
  }).join('');

  return `
    <div style="font-size:0.65rem; color:var(--muted); margin-bottom:12px; letter-spacing:0.1em;">
      ${changes.length} CHANGE${changes.length>1?'S':''} TO BE EXPORTED · ${Object.keys(grouped).length} NODE${Object.keys(grouped).length>1?'S':''} AFFECTED
    </div>
    <div class="change-list">${itemsHtml}</div>
  `;
}

function renderValidation(v) {
  if (v.issues && v.issues.length) {
    return `
      <div class="validation-block">
        <h4>⚠ Validation: ${v.issues.length} Issue${v.issues.length>1?'s':''}</h4>
        <ul>${v.issues.map(i => `<li>${escape(i)}</li>`).join('')}</ul>
      </div>`;
  }
  return `
    <div class="validation-block ok">
      <h4>✓ Validation passed</h4>
      <ul>${(v.notes||['Brief is complete and self-consistent.']).map(n => `<li>${escape(n)}</li>`).join('')}</ul>
    </div>`;
}

window.startBriefGeneration = async function() {
  const lang = document.getElementById('lang-select')?.value || 'en';
  modalStep = 'generating';
  renderModal();

  // Stream loading messages
  const subEl = setInterval(() => {
    const el = document.getElementById('loading-sub');
    if (!el) return;
    const msgs = [
      'analyzing changes for completeness and consistency…',
      'cross-referencing API paths and parameters…',
      'detecting potential conflicts in dependencies…',
      'composing the development brief…',
      'finalizing markdown structure…'
    ];
    el.textContent = msgs[Math.floor(Math.random() * msgs.length)];
  }, 1500);

  try {
    const result = await callLLM(lang);
    generatedBrief = result.markdown;
    validationResult = result.validation;
    clearInterval(subEl);
    modalStep = 'brief';
    renderModal();
  } catch (err) {
    clearInterval(subEl);
    // Fallback to local generation if LLM unavailable
    console.warn('LLM call failed, using local fallback:', err);
    const fallback = generateLocalBrief(lang);
    generatedBrief = fallback.markdown;
    validationResult = fallback.validation;
    modalStep = 'brief';
    renderModal();
  }
};

window.openAutoImproveModal = async function() {
  if (changes.length) {
    toast('Auto-improve is only available before manual session edits.');
    return;
  }
  if (autoImproveState.generatedForSession) {
    toast('Auto-improve can only run once per development brief.');
    return;
  }

  modalStep = 'generating';
  renderModal();
  document.getElementById('modal-overlay').classList.add('visible');
  document.querySelector('.loading-text').textContent = 'EVALUATING AUTO-IMPROVE';

  try {
    const lang = document.getElementById('lang-select')?.value || 'en';
    const result = await callAutoImproveLLM(lang);
    const risks = Array.isArray(result.risks) ? result.risks : [];
    const mitigations = Array.isArray(result.mitigations) ? result.mitigations : [];
    autoImproveState.suggestion = result;
    autoImproveState.contextBrief = result.devBrief;
    autoImproveState.generatedForSession = true;
    generatedBrief = result.previewMarkdown;
    validationResult = { issues: risks.map(r => `Risk: ${r}`), notes: mitigations };
    modalStep = 'brief';
    renderModal();
  } catch (err) {
    console.warn('Auto-improve failed:', err);
    const fallback = generateAutoImproveFallback();
    autoImproveState.suggestion = fallback;
    autoImproveState.contextBrief = fallback.devBrief;
    autoImproveState.generatedForSession = true;
    generatedBrief = fallback.previewMarkdown;
    validationResult = { issues: fallback.risks.map(r => `Risk: ${r}`), notes: fallback.mitigations };
    modalStep = 'brief';
    renderModal();
  }
};

async function callAutoImproveLLM(lang) {
  const response = await fetch(AI_CONFIG.autoImproveEndpoint, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: AI_CONFIG.autoImproveModel,
      language: lang,
      project: PROJECT,
      nodes,
      edges
    })
  });
  if (!response.ok) throw new Error(`API error: ${response.status}`);
  const data = await response.json();
  const txt = data.content.filter(b => b.type === 'text').map(b => b.text).join('\n');
  const parsed = JSON.parse(txt);
  parsed.previewMarkdown = renderAutoImproveMarkdown(parsed);
  return parsed;
}

function generateAutoImproveFallback() {
  const result = {
    title: 'Introduce architecture consistency checks before brief export',
    rationale: 'The editor captures rich architecture data but has no automatic contradiction guard.',
    impact: 'Reduces invalid implementation briefs and prevents divergent architecture decisions.',
    effort: 'Medium',
    architecture_fit: 'Uses existing change tracking and brief generation pipeline.',
    implementation_plan: [
      'Add a rule engine that validates API-flow-node consistency.',
      'Gate dev-brief generation on unresolved high-severity contradictions.',
      'Attach accepted auto-improve suggestion as context to future briefs.'
    ],
    risks: ['Overly strict validation can block productive drafting.'],
    mitigations: ['Introduce severity levels and allow explicit reviewer override with audit note.'],
    guardrails: ['Only available when no manual session changes exist.', 'One auto-improve per brief session.'],
    devBrief: 'Implement a consistency validation stage with severity scoring and contradiction reporting.'
  };
  result.previewMarkdown = renderAutoImproveMarkdown(result);
  return result;
}

function renderAutoImproveMarkdown(s) {
  return `# Auto-Improve Suggestion — ${s.title}\n\n## Why this improvement\n${s.rationale}\n\n## Impact vs Effort\n- Impact: ${s.impact}\n- Effort: ${s.effort}\n- Fit: ${s.architecture_fit}\n\n## Implementation Plan\n${(s.implementation_plan||[]).map((x,i)=>`${i+1}. ${x}`).join('\n')}\n\n## Risks\n${(s.risks||[]).map(r=>`- ${r}`).join('\n')}\n\n## Mitigations\n${(s.mitigations||[]).map(r=>`- ${r}`).join('\n')}\n\n## Guardrails\n${(s.guardrails||[]).map(r=>`- ${r}`).join('\n')}\n\n## Dev Brief Payload\n${s.devBrief}\n`;
}

async function callLLM(lang) {
  const projectContext = {
    project: PROJECT.name,
    repo: PROJECT.repo,
    description: PROJECT.description,
    keyArchitecture: {
      'scoreQuiz pipeline': 'answer → dimensions[] → AFFINITY_MAP → ContributionEvent → Signatur update',
      'Signatur V3': '5 semantic dimensions (Resonanz, Schatten, Antrieb, Körper, Beziehung)',
      'Fusion Ring': 'Dual gravity system: outer global field + line-based sector forces; light/heavy dissonance',
      'BAFE Engine': 'BaZi Analysis Framework Engine, Docker deployed (fly.io / Railway)',
      'Ephemeris': 'Swiss Ephemeris (WASM)'
    }
  };

  // Compact change payload
  const payload = changes.map(c => ({
    type: c.type,
    target: c.target,
    nodeId: c.nodeId,
    description: c.description,
    before: c.before,
    after: c.after,
    stepIndex: c.stepIndex,
    apiIndex: c.apiIndex
  }));

  // Snapshot current node state for affected nodes
  const affectedNodes = [...new Set(changes.map(c => c.nodeId))];
  const currentSnapshot = {};
  affectedNodes.forEach(id => {
    if (nodeMap[id]) currentSnapshot[id] = nodeMap[id];
  });

  const systemPrompt = `You are a Senior Software Architect producing a development brief for a coding agent (Claude Code, Gemini CLI, Codex CLI, etc.). The brief must be precise, atomic, and immediately executable without follow-up questions.

PROJECT CONTEXT:
${JSON.stringify(projectContext, null, 2)}

YOUR TASK:
1. Validate the change set for completeness and internal consistency. Flag missing context (e.g. an added API route without a clear resource shape, a renamed endpoint without checking for callers, deletions without specifying impact on flows).
2. Produce a clean, scannable Markdown brief in ${lang === 'de' ? 'German' : 'English'} with EXACTLY this structure:

# Development Brief — ${PROJECT.name}

## 1. Context
2-4 sentences. What part of the system is changing and why this brief matters now.

## 2. Summary of Changes
Bullet list, one line per atomic change. Use verbs: Add / Modify / Remove / Rename.

## 3. Affected Files & Endpoints
Table or bullet list. Concrete file paths likely to change (e.g. \`apps/web/app/api/quiz/love/route.ts\`, \`packages/engine/scoreQuiz.ts\`). Be precise about route handlers, types, tests, and docs.

## 4. Detailed Implementation Steps
Numbered, atomic steps. Each step:
- Names the file
- Describes the exact change
- Includes code skeletons (TypeScript) where useful
- Calls out type signatures, request/response shapes, error cases

## 5. API Specifications
For every added or modified endpoint: method, path, request params/body, response shape (TypeScript or JSON schema), error codes. Use code blocks.

## 6. Acceptance Criteria
Checklist (\`- [ ]\`). How a reviewer verifies the change works (route returns expected shape, type-check passes, test names that should exist, etc.).

## 7. Risks & Considerations
Brief bullets. Migration concerns, breaking changes, data backfill, cache invalidation, AFFINITY_MAP recalibration if affected.

## 8. Out of Scope
What this brief explicitly does NOT cover, to prevent scope creep.

CRITICAL RULES:
- Use the project's actual terminology: scoreQuiz, AFFINITY_MAP, ContributionEvent, Signatur V3, BAFE, Ephemeris, Fusion Ring.
- Where the user's change description is ambiguous, do NOT invent details — instead, list it under "## 0. ⚠ Validation Issues" at the very top with a clear question.
- If everything is clear, omit the validation section entirely. Do not add empty sections.
- Markdown only. No preamble. No "here is your brief". Start directly with the heading.
- Be terse. No filler. The reader is a senior engineer.

After the markdown, on a new line, output a JSON block on its own line wrapped in <validation>…</validation> tags:
<validation>{"issues":["..."],"notes":["..."]}</validation>
- "issues" lists concrete validation problems (empty array if none).
- "notes" lists confirmations / things you decided / assumptions made.`;

  const userMessage = `# CHANGE SET

${JSON.stringify(payload, null, 2)}

# CURRENT STATE OF AFFECTED NODES (post-edit)

${JSON.stringify(currentSnapshot, null, 2)}

Generate the brief now.`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 4000,
      system: systemPrompt,
      messages: [{ role: "user", content: userMessage }]
    })
  });

  if (!response.ok) {
    throw new Error(`API error: ${response.status} ${response.statusText}`);
  }

  const data = await response.json();
  const fullText = data.content
    .filter(b => b.type === 'text')
    .map(b => b.text)
    .join('\n');

  // Extract validation block
  let validation = { issues: [], notes: [] };
  const m = fullText.match(/<validation>([\s\S]*?)<\/validation>/);
  let markdown = fullText;
  if (m) {
    try { validation = JSON.parse(m[1].trim()); } catch (e) {}
    markdown = fullText.replace(/<validation>[\s\S]*?<\/validation>/, '').trim();
  }

  return { markdown, validation };
}

// ╔══════════════════════════════════════════════════════════════════╗
// ║  LOCAL FALLBACK BRIEF GENERATOR                                   ║
// ╚══════════════════════════════════════════════════════════════════╝
function generateLocalBrief(lang) {
  const isDE = lang === 'de';
  const grouped = {};
  changes.forEach(c => {
    if (!grouped[c.nodeId]) grouped[c.nodeId] = [];
    grouped[c.nodeId].push(c);
  });

  const t = isDE ? {
    title: `Development Brief — ${PROJECT.name}`,
    context: '## 1. Context',
    contextBody: `Diese Änderungen wurden im interaktiven Architektur-Editor des Projekts ${PROJECT.name} erfasst. Sie betreffen den User Flow, API-Routes und/oder strukturelle Komponenten der Plattform.`,
    summary: '## 2. Summary of Changes',
    files: '## 3. Affected Files & Endpoints',
    steps: '## 4. Detailed Implementation Steps',
    apis: '## 5. API Specifications',
    accept: '## 6. Acceptance Criteria',
    risks: '## 7. Risks & Considerations',
    risksBody: '- Bei API-Pfad-Renames: Frontend-Caller und Tests prüfen.',
    scope: '## 8. Out of Scope',
    scopeBody: '- Keine Migration bestehender User-Daten ohne explizite Anweisung.',
  } : {
    title: `Development Brief — ${PROJECT.name}`,
    context: '## 1. Context',
    contextBody: `These changes were captured in the interactive architecture editor for ${PROJECT.name}. They affect user flow, API routes, and/or structural components of the platform.`,
    summary: '## 2. Summary of Changes',
    files: '## 3. Affected Files & Endpoints',
    steps: '## 4. Detailed Implementation Steps',
    apis: '## 5. API Specifications',
    accept: '## 6. Acceptance Criteria',
    risks: '## 7. Risks & Considerations',
    risksBody: '- API path renames: audit frontend callers and tests.',
    scope: '## 8. Out of Scope',
    scopeBody: '- No migration of existing user data without explicit instruction.',
  };

  let md = `# ${t.title}\n\n`;
  md += `> ⚠ **Note:** This brief was generated by the local fallback (LLM unavailable). It is structured but less narrative. Run again with API access for richer formulation.\n\n`;
  md += `${t.context}\n\n${t.contextBody}\n\n`;

  md += `${t.summary}\n\n`;
  changes.forEach(c => {
    md += `- **${c.type.toUpperCase()}** \`${c.target}\` on \`${c.nodeId}\`: ${c.description}\n`;
  });

  md += `\n${t.files}\n\n`;
  Object.keys(grouped).forEach(nodeId => {
    const n = nodeMap[nodeId];
    md += `### \`${nodeId}\`${n ? ` — ${n.label}` : ''}\n`;
    grouped[nodeId].forEach(c => {
      if (c.target === 'api' && c.after) md += `- \`${c.after.method} ${c.after.path}\` (${c.type})\n`;
      if (c.target === 'api' && c.before && !c.after) md += `- \`${c.before.method} ${c.before.path}\` (removed)\n`;
      if (c.target === 'flow') md += `- Flow step: ${c.description}\n`;
      if (c.target === 'edge') md += `- Connection graph: ${c.description}\n`;
      if (c.target === 'position') md += `- Canvas position: ${c.description}\n`;
      if (c.target === 'node') md += `- Entire node: ${c.type}\n`;
      if (c.target === 'notes') md += `- Notes / documentation\n`;
    });
    md += '\n';
  });

  md += `${t.steps}\n\n`;
  changes.forEach((c, i) => {
    md += `### Step ${i+1}: ${c.description}\n`;
    if (c.target === 'api') {
      const a = c.after || c.before;
      md += `\`\`\`http\n${a.method} ${a.path}\n\`\`\`\n`;
      if (a.params && a.params.length) md += `Params: ${a.params.map(p=>`\`${p}\``).join(', ')}\n`;
      if (a.desc) md += `\n${a.desc}\n`;
    } else if (c.before || c.after) {
      md += `\`\`\`json\n${JSON.stringify({ before: c.before, after: c.after }, null, 2)}\n\`\`\`\n`;
    }
    md += '\n';
  });

  md += `${t.apis}\n\n`;
  changes.filter(c => c.target === 'api' && (c.type === 'add' || c.type === 'modify')).forEach(c => {
    const a = c.after;
    md += `**${a.method} \`${a.path}\`**\n\n${a.desc || ''}\n\n`;
    if (a.params && a.params.length) {
      md += `\`\`\`\nParams:\n${a.params.map(p => '  - ' + p).join('\n')}\n\`\`\`\n\n`;
    }
  });

  md += `${t.accept}\n\n`;
  changes.forEach(c => {
    md += `- [ ] ${c.description}\n`;
  });
  md += `- [ ] Typecheck passes (\`npx tsc --noEmit\`)\n- [ ] Lint passes (\`npx eslint . --quiet\`)\n- [ ] Affected tests updated/added\n\n`;

  md += `${t.risks}\n\n${t.risksBody}\n\n`;
  md += `${t.scope}\n\n${t.scopeBody}\n`;

  // Local validation
  const issues = [];
  changes.forEach(c => {
    if (c.target === 'api' && c.type !== 'delete') {
      const a = c.after;
      if (!a.desc) issues.push(`API \`${a.method} ${a.path}\` has no description.`);
      if (!a.params || a.params.length === 0) issues.push(`API \`${a.method} ${a.path}\` has no parameters listed — confirm whether this is intentional.`);
    }
  });

  return {
    markdown: md,
    validation: { issues, notes: ['Generated by local fallback — full LLM brief recommended.'] }
  };
}

// ╔══════════════════════════════════════════════════════════════════╗
// ║  EXPORT ACTIONS                                                   ║
// ╚══════════════════════════════════════════════════════════════════╝
window.copyBrief = function() {
  navigator.clipboard.writeText(generatedBrief).then(() => {
    toast('Markdown copied to clipboard');
  }).catch(() => {
    toast('Copy failed — select & copy manually');
  });
};

window.downloadBrief = function() {
  const blob = new Blob([generatedBrief], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
  a.href = url;
  a.download = `architecture-export-${stamp}.md`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Brief downloaded');
};

// ╔══════════════════════════════════════════════════════════════════╗
// ║  PAN & ZOOM                                                       ║
// ╚══════════════════════════════════════════════════════════════════╝
let scale = 0.52, tx = 0, ty = 0;
let dragging = false, startX, startY, startTx, startTy;

const wrap = document.getElementById('canvas-wrap');
const sceneEl = document.getElementById('scene');

function applyTransform() { sceneEl.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`; }
function centerScene() {
  const vw = window.innerWidth, vh = window.innerHeight;
  tx = (vw - 2400 * scale) / 2;
  ty = (vh - 1600 * scale) / 2;
  applyTransform();
}
window.resetView = function() { scale = 0.52; centerScene(); };
window.zoom = function(factor) { scale = Math.min(2, Math.max(0.2, scale * factor)); centerScene(); };

wrap.addEventListener('mousedown', e => {
  if (e.target.closest('.node') || e.target.closest('#detail-panel') || e.target.closest('#modal-overlay') || e.target.closest('#header')) return;
  dragging = true; startX = e.clientX; startY = e.clientY;
  startTx = tx; startTy = ty;
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  tx = startTx + (e.clientX - startX);
  ty = startTy + (e.clientY - startY);
  applyTransform();
});
window.addEventListener('mouseup', () => { dragging = false; });

wrap.addEventListener('wheel', e => {
  if (e.target.closest('#detail-panel') || e.target.closest('#modal-overlay')) return;
  e.preventDefault();
  const f = e.deltaY < 0 ? 1.1 : 0.91;
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left - wrap.offsetWidth/2;
  const my = e.clientY - rect.top  - wrap.offsetHeight/2;
  tx = mx - (mx - tx) * f;
  ty = my - (my - ty) * f;
  scale = Math.min(2, Math.max(0.2, scale * f));
  applyTransform();
}, { passive: false });

sceneEl.style.transition = 'none';

// ╔══════════════════════════════════════════════════════════════════╗
// ║  INIT                                                             ║
// ╚══════════════════════════════════════════════════════════════════╝
renderAll();
centerScene();

</script>
</body>
